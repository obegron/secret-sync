{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "secret-sync-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "secret-sync-controller.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
{{- end }}
