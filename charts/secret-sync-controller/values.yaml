nameOverride: ""
fullnameOverride: ""

namespace:
  create: false

replicaCount: 1

image:
  repository: docker.io/obegron/secret-sync-controller
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
  namespaced: false

controller:
  syncMode: push
  sourceProvider: kubernetes
  logVerbose: false
  logReconcileActions: false
  kubeconfigSecretName: ""
  kubeconfigSecretKey: config
  hostKubeconfig: ""
  sourceNamespace: ""
  targetNamespace: ""
  hostAPIServer: ""
  hostTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  hostCAFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  bridgeBaseURL: ""
  bridgeTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  bridgeCAFile: ""
  bridgePollInterval: 15s
  bridgeTrustIssuers: ""
  bridgeAllowedSubjects: ""
  oidcProxyEnabled: false
  oidcProxyBaseURL: ""
  defaultDeletePolicy: delete
  pullNamespaceIsolation: false
  allowedSyncTargets: ""
  metricsBindAddress: :8080

probes:
  enabled: true
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

resources: {}
service:
  enabled: true
  type: ClusterIP
  port: 8080
  publishNotReadyAddresses: true
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: secret-sync.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
extraEnv: []
extraVolumes: []
extraVolumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
